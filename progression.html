# Progression

## Rythme

La base est la *pulsation* (battre du pied, de la tête…).

* On regroupe les pulsations en *mesures*,
* et on découpe les pulsations en *subdivisions*.

Tout le monde ne perçoit pas la même pulsation. Entre gens bien élevés, on
reste le plus souvent à un facteur 2 ou 3 près (« half-time » ou
« double-time »).

La pulsation sera le plus souvent notée par une noire, mais peut l’être par
une croche ou une blanche (solfège).

### Bases

#### Mesures

Une *mesure* est un groupe de pulsations et contient le plus souvent 4 ou 3
pulsations, mais aussi parfois 6, 2, 5, 7…
Dans la musique « qu’on entend à la radio », les mesures comportent 4
pulsations et la batterie joue « poum tchac poum tchac », un son par pulsation
(ou temps).

Les mesures sont regroupées en *lignes*, le plus souvent de 4 mesures, mais
aussi de 2, 3 ou 5 mesures.

Il existe des façons de compter les pulsations et les mesures à la fois :
« un (deux, trois, quatre), deux (deux, trois, quatre), trois (deux, trois,
quatre)… »

Les lignes sont regroupées en *sections* (introduction, couplet, pré-refrain,
refrain…).

#### Subdivisions

Les pulsations peuvent être partagées en durées égales, le plus souvent 2, 4
ou 3, parfois jusqu’à 6 ou 8, et plus rarement 5 (solfège + notation Gra).

Il existe des façons de prononcer les subdivisions pour se repérer dans la
mesure et les subdivisions :

* un et, deux et, trois et…
* un-olet, deux-olet, trois-olet…
* one-e-and-a, two-e-and-a, three-e-and-a…

Exo : Sur son instrument (Aller-Retour avec la MD de la guitare par exemple,
ou avec les doigts de la MD de la basse), ou avec la voix,
ou à défaut MD-MG, choisir une subdivision et en jouer toutes les notes.
Essayer toutes les combinaisons (ou rudiments).

Bon exo : passer d’une subdivision à une autre (en jouant toutes les
notes) surtout d’une binaire à une ternaire (ou inversement). On peut aussi
jouer un rythme plus lent que la pulsation, un peu comme si la subdivision
était strictement inférieure à 1.

Le *swing feel* est la notation par deux croches des croches extrêmes d’un
triolet.

### Après les mesures et les subdivisions

* dans 4 noires 3 croches, puis 3 doubles croches
* trouver des exemples de morceaux avec toutes les combinaisons (4:4, 12:8,
  9:8…)
* indépendance des membres et/ou instrument (y compris la voix)

## Notes

On part du postulat : on a douze notes par octave, c’est comme ça.

La base est ici la gamme majeure de do, à partir de laquelle :

1. on travaille à une octave près
1. on a des hauteurs de notes
1. on peut obtenir d’autres gammes majeures (en parallèle du reste, puis
   refaire tout ce qui a été fait pour la gamme majeure de do)
1. on découvre 4 gammes mineures
1. harmonisation de la GM à 3 sons (4 pour le V)
   1. cadences
   1. harmonisation de la gamme mineure harmonique à 3 sons
   1. dominants secondaires
   1. renversements (des triades, puis avec basse séparée)
1. harmonisation à 4 puis 5 sons

Approfondissements :

1. on travaille les modes des gammes
1. on construit des gammes pentatoniques
1. basses étrangères, pédales
1. voicings
1. harmonisation de la gamme mineure mélodique
1. on découvre des gammes exotiques (dim×2, par tons, par 3m…)
